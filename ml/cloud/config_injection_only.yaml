# Google Cloud / Vertex AI training configuration
# Fill in your project-specific values before use.

project_id: your-gcp-project
region: us-central1
staging_bucket: gs://your-training-bucket/staging
service_account: vertex-training@your-gcp-project.iam.gserviceaccount.com

container:
  image_uri: us-central1-docker.pkg.dev/your-gcp-project/injection-detector/trainer:latest
  dockerfile: ml/cloud/Dockerfile
  base_image: pytorch/pytorch:2.6.0-cuda12.4-cudnn9-runtime

job:
  display_name_prefix: injection-detector
  machine_type: n1-standard-8
  accelerator_type: NVIDIA_TESLA_T4
  accelerator_count: 1
  replica_count: 1
  boot_disk_size_gb: 200

training:
  model_config: config/model.yaml
  overrides:
    training.batch_size: 64
    runtime.mixed_precision: bf16

data:
  train_uri: gs://your-training-bucket/data/pi_mix_v1_injection_only/train.jsonl
  val_uri: gs://your-training-bucket/data/pi_mix_v1_injection_only/val.jsonl
  output_uri: gs://your-training-bucket/models/bert-tiny-injection-only/${JOB_TS}

monitoring:
  experiment_name: injection-only
  tensorboard_resource_name: projects/your-project-number/locations/us-central1/tensorboards/your-tensorboard-id
  tensorboard_log_dir: gs://your-training-bucket/tensorboard/${JOB_TS}
  enable_hptuning: false
